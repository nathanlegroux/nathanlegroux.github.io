<!doctype html>
<html lang="en">

<head>
	<!-- Required meta tags -->
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,700,900&display=swap" rel="stylesheet">

	<meta http-equiv=”refresh” content=”3600" />
	<title>Mes J, Dates </title>
</head>

<body>
	<script>
	function getJ(daytoadd) {
		var someDate = new Date();
		var date = new Date(someDate.setDate(someDate.getDate() + daytoadd));
		return date.getDate() + "/" + (date.getMonth() + 1) + "/" + date.getFullYear();
	}
	</script>
	<div class="content" style="text-align: center;">
		<div class="container">
				      
				      <h4>Il est nécessaire de réviser axu dates ci-dessous pour retenir efficacement un cours donné ce jour.</h4>
				      </br></br>
				      
			<div class="col-md-6">
				<form class="mb-5" method="post" id="contactForm" name="contactForm">
					<div class="row">
						<div class="col-md-12">
							<div class="py-2 px-4">
								<h6>Première révision le <script>
									document.write(getJ(0));
									</script>
								</h6>
							</div></br></br>
							<div class="py-2 px-4">
								<h6>Deuxième révision le <script>
									document.write(getJ(1));
									</script>
								</h6>
							</div></br></br>
							<div class="py-2 px-4">
								<h6>Troisième révision le <script>
									document.write(getJ(3));
									</script>
								</h6>
							</div></br></br>
							<div class="py-2 px-4">
								<h6>Quatrième révision le <script>
									document.write(getJ(7));
									</script>
								</h6>
							</div></br></br>
							<div class="py-2 px-4">
								<h6>Cinquième révision le <script>
									document.write(getJ(14));
									</script>
								</h6>
							</div></br></br>
							<div class="py-2 px-4">
								<h6>Sixième révision le <script>
									document.write(getJ(21));
									</script>
								</h6>
							</div></br></br>
							<div class="py-2 px-4">
								<h6>Septième révision le <script>
									document.write(getJ(52));
									</script>
								</h6>
							</div></br></br>
	
						</div>
					</div>
				</form>
			</div>
		</div>
	</div>
	<script src="js/jquery-3.3.1.min.js"></script>
